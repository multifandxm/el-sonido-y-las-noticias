    <main class="grid-content-pages">
        <h1 class="project-title">Proyecto III</h1>  
            <section class="grid-video">     
                <video class="video" autoplay loop src="../NO-SUBIR/noticia-3/VIDEO_venezuela.mp4"></video>
            </section>

            <section class="grid-tracks">
                    <div class="voice">
                        <div class="nameTag">
                            <p class="tag">Locución</p>
                            <label for="volume-voice"></label>
                            <input class="slider" type="range" id="volume-voice" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolumeLocu(this.value); this.nextElementSibling.value = this.value">
                            <output id="value1" class="dB"></output>
                        </div>

                        <div class="controls">
                            <button onclick="muteLocucion1()" id="locucion1Button" class="voz">1</button> <button onclick="muteLocucion2()" id="locucion2Button" class="voz">2</button>
                            <audio id="locucion-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-3/locucion_01_TVL.wav"></audio>
                            <audio id="locucion-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-3/locucion_02_LN.wav"></audio>
                        </div>
                    </div>

                    <div class="ambient">
                        <div class="nameTag">
                            <p class="tag">Paisaje sonoro</p>
                            <label for="volume-ambient"></label>
                            <input class="slider" type="range" id="volume-ambient" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolumeAmbiente(this.value); this.nextElementSibling.value = this.value">
                            <output id="value2" class="dB"></output>
                        </div>

                        <div class="controls">
                            <button onclick="muteAmbiente1()" id="ambiente1Button" class="paisaje">1</button> <button onclick="muteAmbiente2()" id="ambiente2Button" class="paisaje">2</button>
                            <audio id="ambiente-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-3/ambiente_01_trafico.wav"></audio>
                            <audio id="ambiente-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-3/ambiente_02_protesta.wav"></audio>
                        </div>
                    </div>

                    <div class="music">
                        <div class="nameTag">
                            <p class="tag">Música</p>
                            <label for="volume-music"></label>
                            <input class="slider" type="range" id="volume-music" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolumeMusica(this.value); this.nextElementSibling.value = this.value">
                            <output id="value3" class="dB"></output>
                        </div>

                        <div class="controls">
                            <button onclick="muteMusica1()" id="musica1Button" class="musica">1</button> <button onclick="muteMusica2()" id="musica2Button" class="musica">2</button> 
                            <button onclick="muteMusica3()" id="musica3Button" class="musica">3</button> <button onclick="muteMusica4()" id="musica4Button" class="musica">4</button>
                            <audio id="musica-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-3/musica_01_cartoon.wav"></audio>
                            <audio id="musica-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-3/musica_02_reaggeton.wav"></audio>
                            <audio id="musica-3" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-3/musica_03_tensa.wav"></audio>
                            <audio id="musica-4" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-3/musica_04_sonata.wav"></audio>
                        </div>
                    </div>
            </section>
