<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia 1</title>

    <style>
          @font-face {
    font-family: 'wotfardregular';
    src: url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.woff2') format('woff2'),
         url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.eot') format('embedded-opentype'),
         url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: block;
      }

      body{
        font-family: 'wotfardregular', 'Segoe UI', Tahoma, Verdana, sans-serif;
      }
    </style>

    <link rel="stylesheet" href="../style.css">
</head>
<body class="container-pages">
    <header class="grid-header">
        <nav>
            <ul class="return">
                <li class="return"><a href="../index.html" id="inicio">Inicio</a></li>
            </ul>

            <ul class="newsBtn">
                <li class="newsBtn"><a href="news-1.html">Noticia I</a></li>
                <li class="newsBtn"><a href="">Noticia II</a></li>
                <li class="newsBtn"><a href="">Noticia III</a></li>
            </ul>

            <ul class="settings">
                <li class="moon-sun"><img src="../svg/moon.svg" alt="imagen vectorial de una luna"></li>
                <li class="globe"><img src="../svg/globe.svg" alt="imagen vectorial del planeta tierra"></li>
            </ul>
        </nav>
    </header>

    <main class="grid-content-pages">
        <h1 class="project-title">Proyecto I</h1>  
            <section class="grid-video">     
                <video class="video" autoplay loop src="../NO-SUBIR/noticia-1/VIDEO_protesta_jubilados.mp4"></video>
            </section>

            <section class="grid-tracks">
                    <div class="voice">
                        <div class="nameTag">
                            <p class="tag">Locuciones</p>
                            <label for="volume-voice"></label>
                            <input type="range" id="volume-voice" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolume(this.value); this.nextElementSibling.value = this.value">
                            <output class="dB">0 dB</output>
                        </div>

                        <div class="controls">
                            <button onclick="muteLocucion1()" id="locucion1Button" class="voz">1</button> <button onclick="muteLocucion2()" id="locucion2Button" class="voz">2</button>
                            <audio id="locucion-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-1/locucion_01_EFE.wav"></audio>
                            <audio id="locucion-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-1/locucion_02_C5N.wav"></audio>
                        </div>
                    </div>

                    <div class="ambient">
                        <div class="nameTag">
                            <p class="tag">Paisaje sonoro</p>
                            <label for="volume-ambient"></label>
                            <input type="range" id="volume-ambient" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolume(this.value); this.nextElementSibling.value = this.value">
                            <output class="dB">0 dB</output>
                        </div>

                        <div class="controls">
                            <button onclick="muteAmbiente1()" id="ambiente1Button" class="paisaje">1</button> <button onclick="muteAmbiente2()" id="ambiente2Button" class="paisaje">2</button>
                            <audio id="ambiente-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-1/ambiente_01_protesta.wav"></audio>
                            <audio id="ambiente-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-1/ambiente_02_trafico.wav"></audio>
                        </div>
                    </div>

                    <div class="music">
                        <div class="nameTag">
                            <p class="tag">Música</p>
                            <label for="volume-music"></label>
                            <input type="range" id="volume-music" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVolume(this.value); this.nextElementSibling.value = this.value">
                            <output class="dB">0 dB</output>
                        </div>

                        <div class="controls">
                            <button onclick="muteMusica1()" id="musica1Button" class="musica">1</button> <button onclick="muteMusica2()" id="musica2Button" class="musica">2</button> 
                            <button onclick="muteMusica3()" id="musica3Button" class="musica">3</button> <button onclick="muteMusica4()" id="musica4Button" class="musica">4</button>
                            <audio id="musica-1" autoplay loop style="visibility:hidden" src="../NO-SUBIR/noticia-1/musica_01_cinematic.wav"></audio>
                            <audio id="musica-2" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-1/musica_02_noticiero.wav"></audio>
                            <audio id="musica-3" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-1/musica_03_country.wav"></audio>
                            <audio id="musica-4" autoplay loop muted style="visibility:hidden" src="../NO-SUBIR/noticia-1/musica_04_silentsuspicions.wav"></audio>
                        </div>
                    </div>
            </section>
    </main>

    <footer class="grid-footer">
      <p>© 2026 Orianna Machado & Guillermo Vila</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
