<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia 1</title>

    <style>
          @font-face {
    font-family: 'wotfardregular';
    src: url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.woff2') format('woff2'),
         url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.eot') format('embedded-opentype'),
         url('../fonts/Wotfard_Regular_Webfont/wotfard-regular-webfont.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: block;
      }

      body{
        font-family: 'wotfardregular', 'Segoe UI', Tahoma, Verdana, sans-serif;
      }
    </style>

    <link rel="stylesheet" href="../style.css">
</head>
<body class="container-pages">
    <header class="grid-header">
        <nav>
            <ul class="return">
                <li class="return"><a href="../index.html" id="inicio">Inicio</a></li>
            </ul>

            <ul class="newsBtn">
                <li class="newsBtn"><a href="news-1.html">Noticia I</a></li>
                <li class="newsBtn"><a href="">Noticia II</a></li>
                <li class="newsBtn"><a href="">Noticia III</a></li>
            </ul>

            <ul class="settings">
                <li class="moon-sun"><img src="../svg/moon.svg" alt="imagen vectorial de una luna"></li>
                <li class="globe"><img src="../svg/globe.svg" alt="imagen vectorial del planeta tierra"></li>
            </ul>
        </nav>
    </header>

    <main class="grid-project">
        <section data-title="project">
            <h1>Proyecto I</h1>
                <div class="videoContainer">
                  <video autoplay loop>
                    <source src="../videos/VIDEO_protesta_jubilados.mp4" />
                  </video>
                </div>

                <div class="voice">
                    <div class="nameTag">
                        <p class="tag">Locuciones</p>
                        <label for="volume-voice"></label>
                        <input type="range" id="volume-voice" name="volume" min="-60" max="24" value="0" step="3" oninput="controlVocesVolume(this.value); this.nextElementSibling.value = this.value">
                        <output class="dB">0 dB</output>
                    </div>

                    <div class="controls">
                        <button onclick="muteLocucion2()" id="locucion1Button" class="voz">1</button> <button class="voz">2</button>
                        <audio id="locucion-1" autoplay style="visibility:hidden" src="../music/Voz en off STG_01.wav" />
                        <audio id="locucion-2" autoplay style="visibility:hidden" src="../music/Voz en Off 2.mp3" />
                    </div>
                </div>

                <div class="ambient">
                    <div class="nameTag">
                        <p class="tag">Paisaje sonoro</p>
                        <label for="volume-ambient"></label>
                        <input type="range" id="volume-ambient" name="volume" min="-60" max="24" value="0" step="3" oninput="this.nextElementSibling.value = this.value">
                        <output class="dB">0 dB</output>
                    </div>

                    <div class="controls">
                        <button class="paisaje">1</button> <button class="paisaje">2</button>
                    </div>
                </div>

                <div class="music">
                    <div class="nameTag">
                        <p class="tag">Música</p>
                        <label for="volume-music"></label>
                        <input type="range" id="volume-music" name="volume" min="-60" max="24" value="0" step="3" oninput="this.nextElementSibling.value = this.value">
                        <output class="dB">0 dB</output>
                    </div>

                    <div class="controls">
                        <button class="musica">1</button> <button class="musica">2</button> 
                        <button class="musica">3</button> <button class="musica">4</button>
                    </div>
                </div>

                <p class="licencias"><a href=""><img src="../svg/folder.svg" alt="imagen vectorial de una carpeta"></a><a href="" class="licencias-pag">Licencias</a></p>
        </section>
    </main>

    <footer class="grid-footer">

    </footer>
    <script>
      let locucion2muted = document.getElementById('locucion-2').muted
      function muteLocucion2() {
        document.getElementById("locucion-2").muted = locucion2muted = !locucion2muted;
        document.getElementById("locucion1Button").style = locucion2muted ? "background-color:green" : "#B3C9D6";
      } 

      let voces1Player = document.getElementById("locucion-2")
      let voces2Player = document.getElementById("locucion-1")
      function normalizeVolume(value) {
        const min = -60
        const max = 24
        return (value - min) / (max - min)
      }
      function controlVocesVolume(newVolume) {
        let volume = normalizeVolume(newVolume)
        voces1Player.volume = volume;
        voces2Player.volume = volume;
      }

    </script>
</body>
</html>
